name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog

      - name: Install Rust + cross targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-apple-darwin,aarch64-apple-darwin

      # cargo-zigbuild uses zig as the cross-linker (incl. the macOS targets from Linux).
      - name: Install Zig
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to Fuabioo/homebrew-tap (the built-in GITHUB_TOKEN
          # cannot push to another repository). Add it under repo Settings → Secrets.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
